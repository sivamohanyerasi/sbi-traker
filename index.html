<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBI Digital & Insurance Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sticky-header { position: sticky; top: 0; z-index: 40; background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); }
        .log-entry { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        .fab-center {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            box-shadow: 0 10px 25px -5px rgba(30, 58, 138, 0.5);
        }

        .btn-step {
            @apply px-4 bg-slate-100 hover:bg-slate-200 border border-slate-300 text-slate-800 font-bold active:bg-blue-100 transition-colors select-none;
        }
        .text-negative { color: #ef4444 !important; font-weight: 800; }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-10 text-slate-800 pb-24">

    <button onclick="saveData()" class="fab-center bg-blue-800 hover:bg-blue-900 text-white font-bold py-4 px-10 rounded-full flex items-center gap-2 transition-all active:scale-90 uppercase tracking-wider">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
        </svg>
        Save Entry
    </button>

    <div class="max-w-6xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
        <div class="bg-gradient-to-r from-blue-900 to-blue-700 p-6 text-white text-center border-b-4 border-yellow-400">
            <h1 class="text-2xl font-black uppercase tracking-tighter">Banking Metrics Dashboard</h1>
            <p class="opacity-80 text-xs font-bold uppercase tracking-widest">Official Performance Tracker</p>
            <div class="mt-4">
                <button onclick="downloadCSV()" class="bg-white/10 hover:bg-white/20 text-white text-[10px] font-bold py-1.5 px-4 rounded-lg border border-white/30 transition-all uppercase">
                    Export Data (CSV)
                </button>
            </div>
        </div>

        <div class="sticky-header border-b border-gray-200 px-6 py-3 shadow-sm flex justify-between items-center">
            <p id="lastSaved" class="text-[10px] text-green-600 font-bold italic uppercase">Status: System Ready</p>
            <span class="text-[10px] text-gray-400 font-bold uppercase">Excel-Friendly CSV Export</span>
        </div>

        <div class="p-6 md:p-8">
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">

                <div class="lg:col-span-2 space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        
                        <div class="space-y-3">
                            <label class="block text-xs font-bold text-blue-800 uppercase border-l-4 border-blue-800 pl-2">Yono, WhatsApp & CBDC Registration</label>
                            <div class="flex h-10 shadow-sm"><button onclick="step('yonoInput', -1)" class="btn-step rounded-l-lg">-</button><input type="number" id="yonoInput" class="w-full border-y text-center focus:outline-none" placeholder="Yono Reg."><button onclick="step('yonoInput', 1)" class="btn-step rounded-r-lg">+</button></div>
                            <div class="flex h-10 shadow-sm"><button onclick="step('waInput', -1)" class="btn-step rounded-l-lg">-</button><input type="number" id="waInput" class="w-full border-y text-center focus:outline-none" placeholder="WhatsApp Reg."><button onclick="step('waInput', 1)" class="btn-step rounded-r-lg">+</button></div>
                            <div class="flex h-10 shadow-sm"><button onclick="step('cbdcInput', -1)" class="btn-step rounded-l-lg bg-green-50">-</button><input type="number" id="cbdcInput" class="w-full border-y border-green-200 bg-green-50 text-center focus:outline-none" placeholder="e-Rupee (CBDC)"><button onclick="step('cbdcInput', 1)" class="btn-step rounded-r-lg bg-green-50">+</button></div>
                        </div>

                        <div class="space-y-3">
                            <label class="block text-xs font-bold text-slate-500 uppercase border-l-4 border-slate-400 pl-2">Transactions</label>
                            <div class="flex h-10 shadow-sm"><button onclick="step('finInput', -1)" class="btn-step rounded-l-lg">-</button><input type="number" id="finInput" class="w-full border-y text-center focus:outline-none" placeholder="Financial Txns"><button onclick="step('finInput', 1)" class="btn-step rounded-r-lg">+</button></div>
                            <div class="flex h-10 shadow-sm"><button onclick="step('nonFinInput', -1)" class="btn-step rounded-l-lg">-</button><input type="number" id="nonFinInput" class="w-full border-y text-center focus:outline-none" placeholder="Non-Financial Txns"><button onclick="step('nonFinInput', 1)" class="btn-step rounded-r-lg">+</button></div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="bg-green-50 p-4 rounded-xl border border-green-200 space-y-3">
                            <label class="block text-xs font-black text-green-700 uppercase">WhatsApp Channel</label>
                            <div class="flex h-9 shadow-sm"><button onclick="step('atmWA', -1)" class="btn-step rounded-l-lg border-green-300">-</button><input type="number" id="atmWA" class="w-full border-y border-green-300 bg-white text-center text-xs focus:outline-none" placeholder="ATM Request"><button onclick="step('atmWA', 1)" class="btn-step rounded-r-lg border-green-300">+</button></div>
                            <div class="flex h-9 shadow-sm"><button onclick="step('chequeWA', -1)" class="btn-step rounded-l-lg border-green-300">-</button><input type="number" id="chequeWA" class="w-full border-y border-green-300 bg-white text-center text-xs focus:outline-none" placeholder="Cheque Request"><button onclick="step('chequeWA', 1)" class="btn-step rounded-r-lg border-green-300">+</button></div>
                        </div>
                        <div class="bg-blue-50 p-4 rounded-xl border border-blue-200 space-y-3">
                            <label class="block text-xs font-black text-blue-700 uppercase">Yono Channel</label>
                            <div class="flex h-9 shadow-sm"><button onclick="step('atmYono', -1)" class="btn-step rounded-l-lg border-blue-300">-</button><input type="number" id="atmYono" class="w-full border-y border-blue-300 bg-white text-center text-xs focus:outline-none" placeholder="ATM Request"><button onclick="step('atmYono', 1)" class="btn-step rounded-r-lg border-blue-300">+</button></div>
                            <div class="flex h-9 shadow-sm"><button onclick="step('chequeYono', -1)" class="btn-step rounded-l-lg border-blue-300">-</button><input type="number" id="chequeYono" class="w-full border-y border-blue-300 bg-white text-center text-xs focus:outline-none" placeholder="Cheque Request"><button onclick="step('chequeYono', 1)" class="btn-step rounded-r-lg border-blue-300">+</button></div>
                        </div>
                    </div>

                    <div class="bg-slate-50 p-5 rounded-xl border border-slate-200">
                        <label class="block text-xs font-bold text-slate-600 mb-3 uppercase">PAI & Feedback</label>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-2 mb-3">
                            <div class="flex h-9"><button onclick="step('pai1k', -1)" class="btn-step rounded-l-lg">-</button><input type="number" id="pai1k" class="w-full border-y bg-white text-center text-xs" placeholder="1k"><button onclick="step('pai1k', 1)" class="btn-step rounded-r-lg">+</button></div>
                            <div class="flex h-9"><button onclick="step('pai2k', -1)" class="btn-step rounded-l-lg">-</button><input type="number" id="pai2k" class="w-full border-y bg-white text-center text-xs" placeholder="2k"><button onclick="step('pai2k', 1)" class="btn-step rounded-r-lg">+</button></div>
                            <div class="flex h-9"><button onclick="step('pai3k', -1)" class="btn-step rounded-l-lg">-</button><input type="number" id="pai3k" class="w-full border-y bg-white text-center text-xs" placeholder="3k"><button onclick="step('pai3k', 1)" class="btn-step rounded-r-lg">+</button></div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
                            <div class="flex h-9"><button onclick="step('feedbackInput', -1)" class="btn-step rounded-l-lg">-</button><input type="number" id="feedbackInput" class="w-full border-y bg-white text-center text-xs" placeholder="Feedback"><button onclick="step('feedbackInput', 1)" class="btn-step rounded-r-lg">+</button></div>
                            <div class="flex h-9"><button onclick="step('inopInput', -1)" class="btn-step rounded-l-lg bg-red-50 border-red-200">-</button><input type="number" id="inopInput" class="w-full border-y border-red-200 bg-red-50 text-center text-xs" placeholder="Inop Act."><button onclick="step('inopInput', 1)" class="btn-step rounded-r-lg bg-red-50">+</button></div>
                        </div>
                    </div>
                </div>

                <div class="bg-slate-100 p-5 rounded-xl border border-gray-300 shadow-inner h-fit">
                    <h2 class="text-sm font-black text-gray-500 border-b border-gray-300 pb-2 text-center uppercase tracking-widest mb-4">Live Totals</h2>
                    <div id="totalsContainer" class="space-y-2.5"></div>
                    <button onclick="resetData()" class="w-full mt-8 text-[9px] text-red-400 hover:text-red-600 uppercase font-black tracking-widest">Clear All Data</button>
                </div>

                <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm h-fit">
                    <h2 class="text-[10px] font-black text-gray-400 uppercase mb-4 tracking-widest border-b pb-2">Entry Timeline</h2>
                    <div id="activityLog" class="space-y-3"></div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const FIELDS = {
            'Yono Reg': 'yonoInput', 'WA Reg': 'waInput', 'CBDC': 'cbdcInput', 
            'Fin Txn': 'finInput', 'Non-Fin Txn': 'nonFinInput', 
            'ATM (WA)': 'atmWA', 'ATM (Yono)': 'atmYono',
            'Cheque (WA)': 'chequeWA', 'Cheque (Yono)': 'chequeYono',
            'PAI 1k': 'pai1k', 'PAI 2k': 'pai2k', 'PAI 3k': 'pai3k', 
            'Feedback': 'feedbackInput', 'Inop Act': 'inopInput'
        };

        window.onload = function() {
            updateDisplay();
            const lastTime = localStorage.getItem('sbi_v9_last_time');
            if (lastTime) {
                document.getElementById('lastSaved').innerText = "Last Saved: " + lastTime;
            }
        };

        function step(id, val) {
            const el = document.getElementById(id);
            let current = parseInt(el.value) || 0;
            let result = current + val;
            if (result < -5) result = -5;
            el.value = result;
            if (result < 0) { el.classList.add('text-negative'); } 
            else { el.classList.remove('text-negative'); }
        }

        function getPreciseTime() {
            return new Date().toLocaleTimeString('en-US', { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function saveData() {
            let store = JSON.parse(localStorage.getItem('sbi_v9_stats')) || {};
            const time = getPreciseTime();
            let hasEntry = false;

            Object.keys(FIELDS).forEach(label => {
                const el = document.getElementById(FIELDS[label]);
                const val = parseInt(el.value || 0);
                if (val !== 0) {
                    if (!store[label]) store[label] = [];
                    store[label].push({ val: val, time: time });
                    hasEntry = true;
                    el.value = "";
                    el.classList.remove('text-negative');
                }
            });

            if (!hasEntry) return;
            
            localStorage.setItem('sbi_v9_stats', JSON.stringify(store));
            localStorage.setItem('sbi_v9_last_time', time);
            document.getElementById('lastSaved').innerText = "Last Saved: " + time;
            updateDisplay();
        }

        function updateDisplay() {
            const store = JSON.parse(localStorage.getItem('sbi_v9_stats')) || {};
            const container = document.getElementById('totalsContainer');
            const log = document.getElementById('activityLog');
            let html = "";
            let logData = [];

            Object.keys(FIELDS).forEach(label => {
                const entries = store[label] || [];
                const total = entries.reduce((s, i) => s + i.val, 0);
                const last = entries.length > 0 ? entries[entries.length - 1].time : '--:--:--';
                
                html += `
                    <div class="flex justify-between items-center bg-white p-2 rounded border border-gray-200">
                        <div class="flex flex-col">
                            <span class="text-[10px] font-bold text-slate-600 uppercase">${label}</span>
                            <span class="text-[8px] text-slate-400 italic">Last: ${last}</span>
                        </div>
                        <span class="${total < 0 ? 'text-red-600' : 'text-blue-800'} font-black text-sm">${total}</span>
                    </div>`;
                entries.forEach(e => logData.push({ name: label, ...e }));
            });

            container.innerHTML = html;
            logData.sort((a, b) => b.time.localeCompare(a.time));
            const latest = logData.slice(0, 10);
            
            log.innerHTML = latest.length > 0 ? latest.map(e => `
                <div class="log-entry bg-slate-50 p-2 rounded border-l-2 ${e.val < 0 ? 'border-red-400' : 'border-blue-400'} text-[9px] flex justify-between">
                    <div><b class="text-slate-700 uppercase">${e.name}</b><br><span class="text-gray-400">${e.time}</span></div>
                    <div class="${e.val < 0 ? 'text-red-600' : 'text-blue-600'} font-bold self-center text-xs">${e.val > 0 ? '+' : ''}${e.val}</div>
                </div>
            `).join('') : '<p class="text-[10px] text-gray-300 italic">No entries recorded.</p>';
        }

        function downloadCSV() {
            const store = JSON.parse(localStorage.getItem('sbi_v9_stats')) || {};
            
            // Add a tab prefix (\t) to the time so Excel treats it as a string, preventing ####
            let csv = "Timestamp,Metric,Value\r\n";
            let totals = {};

            // 1. History Section
            Object.keys(FIELDS).forEach(k => {
                const entries = store[k] || [];
                let fieldTotal = 0;
                entries.forEach(e => {
                    csv += `\t${e.time},${k},${e.val}\r\n`;
                    fieldTotal += e.val;
                });
                totals[k] = fieldTotal;
            });

            // 2. Grand Totals Section
            csv += "\r\n--- GRAND TOTALS ---\r\n";
            csv += "Metric,Total Value\r\n";
            Object.keys(totals).forEach(label => {
                csv += `${label},${totals[label]}\r\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", `Branch_Report_${new Date().toLocaleDateString()}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function resetData() {
            if(confirm("Confirm: Clear all stored branch metrics?")) {
                localStorage.removeItem('sbi_v9_stats');
                localStorage.removeItem('sbi_v9_last_time');
                location.reload();
            }
        }
    </script>
</body>
</html>
